<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Post Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'DM Mono', monospace; padding: 2rem; }
    h1 { color: #c8a96e; margin-bottom: 2rem; font-size: 1.2rem; letter-spacing: 0.1em; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; }
    input, textarea { width: 100%; background: #141414; border: 1px solid #2a2a2a; color: #e0e0e0; padding: 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.9rem; border-radius: 4px; outline: none; }
    input:focus, textarea:focus { border-color: #c8a96e; }
    textarea { min-height: 300px; resize: vertical; }
    .btn-add { background: #c8a96e; color: #0a0a0a; border: none; padding: 0.8rem 2rem; font-family: 'DM Mono', monospace; font-size: 0.9rem; cursor: pointer; border-radius: 4px; margin-top: 0.5rem; }
    .btn-add:hover { background: #e0c080; }
    .output { margin-top: 2rem; background: #141414; border: 1px solid #2a2a2a; padding: 1rem; border-radius: 4px; }
    .output h2 { font-size: 0.8rem; color: #888; margin-bottom: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .output pre { font-size: 0.8rem; color: #c8a96e; white-space: pre-wrap; word-break: break-all; }
    .msg { padding: 0.8rem; border-radius: 4px; margin-top: 1rem; font-size: 0.85rem; }
    .msg.success { background: #0d2b1a; color: #4caf82; border: 1px solid #1a4a30; }
    .msg.error { background: #2b0d0d; color: #cf6679; border: 1px solid #4a1a1a; }
    .existing { margin-top: 2rem; }
    .existing h2 { font-size: 0.8rem; color: #888; margin-bottom: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .post-item { background: #141414; border: 1px solid #2a2a2a; padding: 0.8rem 1rem; border-radius: 4px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .post-item span { font-size: 0.85rem; }
    .btn-del { background: transparent; border: 1px solid #4a1a1a; color: #cf6679; padding: 0.3rem 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; border-radius: 3px; }
    .btn-del:hover { background: #2b0d0d; }
    .note { font-size: 0.75rem; color: #555; margin-top: 0.5rem; line-height: 1.6; }
    .password-gate { max-width: 400px; margin: 4rem auto; text-align: center; }
    .password-gate input { margin: 1rem 0; text-align: center; }
  </style>
</head>
<body>

  <div id="gate" class="password-gate">
    <h1>// ADMIN ACCESS</h1>
    <input type="password" id="pass-input" placeholder="Enter password" />
    <br/>
    <button class="btn-add" onclick="checkPass()">Enter</button>
    <p id="gate-err" class="msg error" style="display:none;">Wrong password.</p>
  </div>

  <div id="admin-panel" style="display:none; max-width: 800px; margin: 0 auto;">
    <h1>// POST MANAGER</h1>

    <div class="form-group">
      <label>Post Title</label>
      <input type="text" id="title" placeholder="e.g. The Last Monk Seal of the Aegean" />
    </div>

    <div class="form-group">
      <label>Image URL</label>
      <input type="text" id="image" placeholder="https://... or relative path like images/post1.jpg" />
    </div>

    <div class="form-group">
      <label>Excerpt (1-2 sentences shown in list)</label>
      <input type="text" id="excerpt" placeholder="Short description shown in the research list..." />
    </div>

    <div class="form-group">
      <label>Content (HTML supported)</label>
      <textarea id="content" placeholder="Write your full article here. You can use &lt;p&gt;, &lt;h2&gt;, &lt;strong&gt;, &lt;em&gt;, &lt;blockquote&gt; tags..."></textarea>
    </div>

    <button class="btn-add" onclick="addPost()">Add Post →</button>
    <p class="note">After adding, copy the generated posts.js content below and replace your posts.js file on GitHub.</p>

    <div id="msg-area"></div>

    <div class="existing">
      <h2>Existing Posts</h2>
      <div id="posts-list"></div>
    </div>

    <div class="output" id="output-area" style="display:none;">
      <h2>Updated posts.js — Copy this to GitHub</h2>
      <pre id="output-code"></pre>
    </div>
  </div>

  <script src="posts.js"></script>
  <script>
    // Simple password gate — change "admin2026" to your own password
    const ADMIN_PASS = "admin2026";
    let localPosts = [...posts];

    function checkPass() {
      const val = document.getElementById('pass-input').value;
      if (val === ADMIN_PASS) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        renderList();
      } else {
        document.getElementById('gate-err').style.display = 'block';
      }
    }

    function renderList() {
      const container = document.getElementById('posts-list');
      if (localPosts.length === 0) {
        container.innerHTML = '<p style="color:#555;font-size:0.85rem;">No posts yet.</p>';
        return;
      }
      container.innerHTML = '';
      localPosts.forEach((p, i) => {
        container.innerHTML += `
          <div class="post-item">
            <span>${p.date} — ${p.title}</span>
            <button class="btn-del" onclick="deletePost(${i})">Delete</button>
          </div>`;
      });
    }

    function generateId() {
      return 'post_' + Date.now();
    }

    function getDate() {
      const d = new Date();
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function addPost() {
      try {
        const title = document.getElementById('title').value.trim();
        const image = document.getElementById('image').value.trim();
        const excerpt = document.getElementById('excerpt').value.trim();
        const content = document.getElementById('content').value.trim();
        const msgArea = document.getElementById('msg-area');

        if (!title || !excerpt || !content) {
          msgArea.innerHTML = '<div class="msg error">Please fill in title, excerpt, and content.</div>';
          return;
        }

        const newPost = {
          id: generateId(),
          title,
          image: image || '',
          excerpt,
          date: getDate(),
          content
        };

        localPosts.unshift(newPost);
        renderList();
        generateOutput();

        document.getElementById('title').value = '';
        document.getElementById('image').value = '';
        document.getElementById('excerpt').value = '';
        document.getElementById('content').value = '';
        msgArea.innerHTML = '<div class="msg success">Post added! Scroll down to copy the code.</div>';

        // Auto-scroll so the generated code is visible immediately (helps on mobile)
        document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        alert('ERROR: ' + err.message);
        console.error(err);
      }
    }

    function deletePost(index) {
      if (confirm('Delete this post?')) {
        localPosts.splice(index, 1);
        renderList();
        generateOutput();
      }
    }

    function generateOutput() {
      const code = `const posts = ${JSON.stringify(localPosts, null, 2)};`;
      document.getElementById('output-code').textContent = code;
      document.getElementById('output-area').style.display = 'block';
    }
  </script>
</body>
</html>
